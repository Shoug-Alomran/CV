site_name: Shoug Alomran
site_description: Software Engineer & Cybersecurity Specialist building structured digital systems, modern web platforms, and documentation-driven experiences.
site_url: https://cv.shoug-tech.com/
copyright: Made by <a href="https://blueprint.shoug-tech.com" target="_blank" rel="noreferrer">Blueprint</a>

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Identity: index.md

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/identity.css

extra_javascript:
  - assets/javascripts/identity.js

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Shoug-Alomran
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/shoug-alomran/
      name: LinkedIn
    - icon: fontawesome/solid/globe
      link: https://blueprint.shoug-tech.com
      name: Blueprint Studio
