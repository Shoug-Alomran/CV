site_name: Shoug Alomran
site_description: Software Engineer and Cybersecurity student building secure, maintainable, and well-documented software from concept to deployment.
site_url: https://cv.shoug-tech.com/
copyright: Made by <a href="https://blueprint.shoug-tech.com" target="_blank" rel="noreferrer">Blueprint</a>

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  favicon: assets/images/favicon.png
  palette:
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Identity: index.md

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/identity.css

extra:
  generator: false
